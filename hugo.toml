baseURL = 'https://www.moonforgelinux.com'
languageCode = 'en-us'
title = 'Moonforge'
theme = 'docsy'

enableGitInfo = false
enableRobotsTXT = true

[module]
replacements = 'github.com/FortAwesome/Font-Awesome -> ., github.com/twbs/bootstrap -> .'
  [module.imports]
  paths = ["docsy"]

[taxonomies]
tag = "tags"
category = "categories"

[markup]
  [markup.tableOfContents]
    endLevel = 5
  [markup.goldmark]
    [markup.goldmark.parser.attribute]
      block = true
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    # See a complete list of available styles at https://xyproto.github.io/splash/docs/all.html
    #style = "tango"
    # Uncomment if you want your chosen highlight style used for code blocks without a specified language
    # guessSyntax = "true"

# Comment out if you don't want the "print entire section" link enabled.
[outputs]
section = ["HTML", "RSS"]

[params]
archived_version = false
url_latest_version = "https://www.moonforgelinux.com"
github_project_repo = "https://github.com/moonforgelinux/"
github_repo = "https://github.com/moonforgelinux/moonforge-web"
github_branch = "main"

[params.copyright]
authors = "Igalia S.L. | [CC BY 4.0](https://creativecommons.org/licenses/by/4.0)"
from_year = 2026
to_year = "present"

[permalinks]
blog = "/:section/:year/:month/:day/:slug/"

[params.ui]
breadcrumb_disable = false
navbar_logo = false
navbar_translucent_over_cover_disable = false
sidebar_menu_compact = false
sidebar_search_disable = false
showLightDarkModeMenu = true

[params.links]
# Developer relevant links. These will show up on right side of footer and in the community page if you have one.
[[params.links.developer]]
  name = "Discussions"
  url = "https://github.com/orgs/moonforgelinux/discussions"
  icon = "fa-regular fa-message"
  desc = "Discussions and help"
[[params.links.developer]]
  name = "Project repository"
  url = "https://github.com/moonforgelinux"
  icon = "fa-brands fa-square-github"
  desc = "The Moonforge project repository"
[[params.links.developer]]
  name = "Website repository"
  url = "https://github.com/moonforgelinux/moonforge-web"
  icon = "fa-brands fa-github"
  desc = "The Moonforge website repository"
